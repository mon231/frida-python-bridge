name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          # macos-latest is arm64; setup-python has no 3.8/3.9 builds there.
          - os: macos-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.9"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install JS deps & build
        run: |
          npm ci
          npm run build

      - name: Install Python test deps (frida + pytest)
        run: pip install -r requirements-dev.txt

      - name: Relax ptrace (Linux self-injection)
        if: runner.os == 'Linux'
        run: sudo sysctl kernel.yama.ptrace_scope=0

      # macOS ships a hardened-runtime, library-validated Python.framework binary, which
      # frida cannot spawn-inject into (the spawn handshake times out). Ad-hoc re-sign the
      # interpreter with `get-task-allow` (+ relaxed codesign flags) so it is debuggable.
      - name: Allow frida injection on macOS (re-sign target python)
        if: runner.os == 'macOS'
        run: |
          cat > /tmp/fpb-ent.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>com.apple.security.get-task-allow</key><true/>
            <key>com.apple.security.cs.disable-library-validation</key><true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>
            <key>com.apple.security.cs.allow-dyld-environment-variables</key><true/>
          </dict></plist>
          PLIST
          PYBIN=$(python -c "import os,sys; print(os.path.realpath(sys.executable))")
          echo "re-signing $PYBIN"
          codesign -s - -f --options runtime --entitlements /tmp/fpb-ent.plist "$PYBIN"
          codesign -d --entitlements - "$PYBIN" || true

      - name: Run tests
        run: pytest

  freethreaded:
    name: ubuntu / Python 3.13t (free-threaded)
    runs-on: ubuntu-latest
    # No continue-on-error: the lane exits 0 by design when frida has no free-threaded
    # wheel (env limitation), and fails the workflow only on a real test failure.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Set up free-threaded Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13t"
      - run: |
          npm ci
          npm run build
      # Frida has no free-threaded (abi3t) wheel yet, so install + test are best-effort:
      # the lane passes (skips) when frida is unavailable rather than reporting red.
      - run: pip install -r requirements-dev.txt || echo "frida unavailable for free-threaded build"
      - run: sudo sysctl kernel.yama.ptrace_scope=0 || true
      - run: |
          if python -c "import frida" 2>/dev/null; then
            pytest
          else
            echo "::notice::frida not installable on free-threaded Python yet - skipping tests"
          fi

  legacy-targets:
    # The bridge supports CPython 3.6+. Frida itself no longer installs on 3.6/3.7, so we
    # run pytest/frida on a modern HOST python and inject into an old TARGET interpreter
    # (frida injects regardless of the target's version). ubuntu-22.04 still ships 3.6/3.7.
    name: target Python ${{ matrix.target }} (host 3.11)
    runs-on: ubuntu-22.04
    # No job-level continue-on-error: an unprovisionable EOL target (3.6) is tolerated at
    # the step level and its test step is skipped, so the job fails only on a real failure.
    strategy:
      fail-fast: false
      matrix:
        target: ["3.6", "3.7"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Set up TARGET Python ${{ matrix.target }}
        id: target
        continue-on-error: true # 3.6 is EOL and no longer in the setup-python manifest
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.target }}
          update-environment: false
      - name: Set up HOST Python (runs frida + pytest)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          npm ci
          npm run build
      - run: pip install -r requirements-dev.txt
      - run: sudo sysctl kernel.yama.ptrace_scope=0
      - name: Run core suite against the ${{ matrix.target }} target
        # Skip cleanly when the EOL target could not be provisioned (no red X).
        if: steps.target.outcome == 'success' && steps.target.outputs.python-path != ''
        env:
          FPB_TARGET_PYTHON: ${{ steps.target.outputs.python-path }}
        run: pytest test/test_bridge.py

  lint:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm ci
      - name: Type-check (no emit)
        run: npx tsc --noEmit
