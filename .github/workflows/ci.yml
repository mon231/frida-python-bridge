name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
        exclude:
          # macos-latest is arm64; setup-python has no 3.8/3.9 builds there.
          - os: macos-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.9"
    runs-on: ${{ matrix.os }}
    # Frida self-injection on macOS CI is finicky (hardened runtime / library
    # validation); keep macOS best-effort so it doesn't block the run.
    continue-on-error: ${{ matrix.os == 'macos-latest' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install JS deps & build
        run: |
          npm ci
          npm run build

      - name: Install Python test deps (frida + pytest)
        run: pip install -r requirements-dev.txt

      - name: Relax ptrace (Linux self-injection)
        if: runner.os == 'Linux'
        run: sudo sysctl kernel.yama.ptrace_scope=0

      - name: Run tests
        run: pytest

  freethreaded:
    name: ubuntu / Python 3.13t (free-threaded)
    runs-on: ubuntu-latest
    continue-on-error: true # free-threaded support is best-effort
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Set up free-threaded Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13t"
      - run: |
          npm ci
          npm run build
      # Frida has no free-threaded (abi3t) wheel yet, so install + test are best-effort:
      # the lane passes (skips) when frida is unavailable rather than reporting red.
      - run: pip install -r requirements-dev.txt || echo "frida unavailable for free-threaded build"
      - run: sudo sysctl kernel.yama.ptrace_scope=0 || true
      - run: |
          if python -c "import frida" 2>/dev/null; then
            pytest
          else
            echo "::notice::frida not installable on free-threaded Python yet - skipping tests"
          fi

  legacy-targets:
    # The bridge supports CPython 3.6+. Frida itself no longer installs on 3.6/3.7, so we
    # run pytest/frida on a modern HOST python and inject into an old TARGET interpreter
    # (frida injects regardless of the target's version). ubuntu-22.04 still ships 3.6/3.7.
    name: target Python ${{ matrix.target }} (host 3.11)
    runs-on: ubuntu-22.04
    continue-on-error: true # old EOL interpreters / static-build symbol export are best-effort
    strategy:
      fail-fast: false
      matrix:
        target: ["3.6", "3.7"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Set up TARGET Python ${{ matrix.target }}
        id: target
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.target }}
          update-environment: false
      - name: Set up HOST Python (runs frida + pytest)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          npm ci
          npm run build
      - run: pip install -r requirements-dev.txt
      - run: sudo sysctl kernel.yama.ptrace_scope=0
      - name: Run core suite against the ${{ matrix.target }} target
        env:
          FPB_TARGET_PYTHON: ${{ steps.target.outputs.python-path }}
        run: pytest test/test_bridge.py

  lint:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - run: npm ci
      - name: Type-check (no emit)
        run: npx tsc --noEmit
