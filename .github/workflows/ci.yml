name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          # macos-latest is arm64; setup-python has no 3.8/3.9 builds there.
          - os: macos-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.9"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Relax ptrace (Linux self-injection)
        if: runner.os == 'Linux'
        run: sudo sysctl kernel.yama.ptrace_scope=0

      - uses: actions/checkout@v4

      # Headless CI has no window server to show the "allow debugging" prompt that
      # task_for_pid() normally triggers, so the request just hangs/denies. This grants
      # the taskport right without an interactive prompt (frida's own troubleshooting
      # docs recommend this for exactly this SSH/CI scenario). Narrower than disabling SIP.
      - name: Allow frida task-port access (macOS headless CI)
        if: runner.os == 'macOS'
        run: sudo security authorizationdb write system.privilege.taskport allow

      # macOS ships a hardened-runtime, library-validated Python.framework binary, which
      # blocks frida's injected agent from mapping executable pages / loading unsigned code.
      # Ad-hoc re-sign the interpreter with `get-task-allow` (+ relaxed codesign flags) so
      # it accepts injection.
      - name: Allow frida injection on macOS (re-sign target python)
        if: runner.os == 'macOS'
        run: |
          PYBIN=$(python -c "import os,sys; print(os.path.realpath(sys.executable))")
          echo "re-signing $PYBIN"
          codesign -s - -f --options runtime --entitlements test/host/entitlements.plist "$PYBIN"
          codesign -d --entitlements - "$PYBIN" || true

      - name: Install Python test deps (frida + pytest)
        run: pip install -r requirements-dev.txt

      - name: Install JS deps & build
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: pytest

      # frida's own "detached" event doesn't always carry a CrashInfo (seen: reason
      # process-terminated, crash=None) even when the target genuinely segfaulted. macOS
      # writes a system crash report independently of frida, so dump any produced during
      # this run to see the actual faulting thread/exception type.
      - name: Dump macOS crash reports (on failure)
        if: failure() && runner.os == 'macOS'
        run: |
          shopt -s nullglob nocaseglob
          reports=(~/Library/Logs/DiagnosticReports/*python* /Library/Logs/DiagnosticReports/*python*)
          if [ ${#reports[@]} -eq 0 ]; then
            echo "::notice::no macOS crash reports found for python*"
          fi
          for f in "${reports[@]}"; do
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done

  freethreaded:
    name: ubuntu / Python 3.13t (free-threaded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set up free-threaded Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13t"

      - run: sudo sysctl kernel.yama.ptrace_scope=0 || true

      - uses: actions/checkout@v4

      - run: |
          npm ci
          npm run build

      - run: pip install -r requirements-dev.txt || echo "frida unavailable for free-threaded build"
      - run: |
          if python -c "import frida" 2>/dev/null; then
            pytest
          else
            echo "::notice::frida not installable on free-threaded Python yet - skipping tests"
          fi

  legacy-targets:
    name: target Python ${{ matrix.target }} (host 3.11)
    runs-on: ubuntu-22.04

    strategy:
      fail-fast: false
      matrix:
        target: ["3.6", "3.7"]
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set up TARGET Python ${{ matrix.target }}
        id: target
        continue-on-error: true # Python-3.6 is EOL and no longer in the setup-python manifest
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.target }}
          update-environment: false

      - name: Set up HOST Python (runs frida + pytest)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: sudo sysctl kernel.yama.ptrace_scope=0

      - uses: actions/checkout@v4
      - run: |
          npm ci
          npm run build

      - run: pip install -r requirements-dev.txt

      - name: Run core suite against the ${{ matrix.target }} target
        if: steps.target.outcome == 'success' && steps.target.outputs.python-path != ''
        env:
          FPB_TARGET_PYTHON: ${{ steps.target.outputs.python-path }}
        run: pytest test/test_bridge.py

  static-host:
    name: static/stripped host (Linux x86_64, Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Set up Python (runs frida + pytest)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: sudo sysctl kernel.yama.ptrace_scope=0

      - uses: actions/checkout@v4

      - run: pip install -r requirements-dev.txt
      - run: |
          npm ci
          npm run build

      # Fixed, known-good CPython 3.12 patch release (any 3.12.x works for this - we only
      # need a --disable-shared build to put Py_GetVersion in the main executable instead
      # of a separate libpython.so). CPython's default build passes -fvisibility=hidden on
      # every compile; PyAPI_FUNC is meant to override that per-symbol, but relying on that
      # working correctly for a --disable-shared build is exactly the thing under test here
      # - force the file-level default to "default" visibility too, so -Wl,--export-dynamic
      # at link time has an unambiguous, guaranteed-visible symbol set to promote into
      # .dynsym instead of depending on that macro's behavior in this configuration.
      - name: Build a statically-linked CPython 3.12
        run: |
          curl -fsSL -o /tmp/cpython.tgz https://www.python.org/ftp/python/3.12.8/Python-3.12.8.tgz
          tar xzf /tmp/cpython.tgz -C /tmp
          cd /tmp/Python-3.12.8
          ./configure --prefix=/tmp/static-cpython --disable-shared --without-ensurepip CFLAGS=-fvisibility=default
          make -j"$(nproc)"
          make install

      - name: Build the export-dynamic static host
        run: |
          cc test/host/embed.c \
            $(/tmp/static-cpython/bin/python3.12-config --cflags --embed) \
            $(/tmp/static-cpython/bin/python3.12-config --ldflags --embed) \
            -Wl,--export-dynamic \
            -o /tmp/static_host_dynamic
          echo "--- Py_GetVersion in the dynamic symbol table? ---"
          nm -D /tmp/static_host_dynamic | grep Py_GetVersion || echo "NOT FOUND in .dynsym"

      - name: Build + strip a plain static host (no export-dynamic)
        run: |
          cc test/host/embed.c \
            $(/tmp/static-cpython/bin/python3.12-config --cflags --embed) \
            $(/tmp/static-cpython/bin/python3.12-config --ldflags --embed) \
            -o /tmp/static_host_stripped
          # Capture file offsets for the symbols the $config escape-hatch test needs
          # *before* stripping removes their names.
          python3 test/host/dump_offsets.py /tmp/static_host_stripped > /tmp/static_host_stripped.offsets.json
          strip --strip-all /tmp/static_host_stripped

      - name: Run static/stripped host tests
        env:
          FPB_STATIC_HOST_DYNAMIC: /tmp/static_host_dynamic
          FPB_STATIC_HOST_STRIPPED: /tmp/static_host_stripped
          FPB_STATIC_HOST_STRIPPED_OFFSETS: /tmp/static_host_stripped.offsets.json
        run: pytest test/test_static_host.py -v

  lint:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - uses: actions/checkout@v4
      - run: npm ci

      - name: Type-check (no emit)
        run: npx tsc --noEmit
